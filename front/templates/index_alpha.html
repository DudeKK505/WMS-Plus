<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Analytics | Ship QL Scraper</title>
    <style>
        /* Reset i baza */
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Główny kontener - teraz wszystko idzie w kolumnie z automatu */
        .container { 
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 15px; /* Magiczny odstęp między wszystkimi elementami */
            text-align: center;
        }

        h2 { margin: 0; color: #1a202c; font-size: 1.6rem; }
        p { margin: 0; color: #718096; font-size: 0.85rem; line-height: 1.4; }

        /* Grupa wejściowa */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="text"] { 
            padding: 14px; 
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: #3182ce; }

        button { 
            background-color: #2d3748; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover { background-color: #1a202c; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }

        /* Box statusu - wycentrowany w środku kontenera */
        .status-box { 
            padding: 20px; 
            background-color: #f8fafc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            border: 1px inset #edf2f7;
        }

        /* Spinner i animacje */
        .loader {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3182ce;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .blink { animation: blinker 1.5s linear infinite; color: #3182ce; font-size: 0.9rem; font-weight: 500; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .result-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; margin-bottom: 5px; }
        .result-value { font-size: 2.2rem; font-weight: 800; color: #38a169; }
        .error-value { color: #e53e3e; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>WMS Ship Scraper</h2>
    <p>Automatyczne wyliczanie QL dla Tour ID.<br>Narzędzie analityczne dla AM/OM.</p>
    
    <div class="input-group">
        <input type="text" id="tourId" placeholder="Wprowadź Tour ID..." autocomplete="off">
        <button id="startBtn" onclick="initiateScrape()">Generuj Raport</button>
    </div>

    <div id="statusBox" class="status-box" style="display:none;">
        <div id="loadingElement">
            <div class="loader"></div>
            <div id="statusText" class="blink">Przetwarzanie danych...</div>
        </div>

        <div id="resultContainer" style="display:none;">
            <div id="resultLabel" class="result-label"></div>
            <div id="resultValue" class="result-value"></div>
        </div>
    </div>
</div>

<script>
    let currentTaskId = null;
    let pollInterval = null;
    let startTime = null;

    async function initiateScrape() {
        const tourId = document.getElementById('tourId').value.trim();
        if (!tourId) return;

        document.getElementById('startBtn').disabled = true;
        document.getElementById('statusBox').style.display = 'flex';
        document.getElementById('loadingElement').style.display = 'flex';
        document.getElementById('loadingElement').style.flexDirection = 'column';
        document.getElementById('loadingElement').style.alignItems = 'center';
        document.getElementById('resultContainer').style.display = 'none';
        document.getElementById('statusText').innerText = `Analizuję Tour: ${tourId}`;
        
        startTime = Date.now();

        try {
            const response = await fetch('/start_scrape', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tour_id: tourId })
            });
            const data = await response.json();
            currentTaskId = data.task_id;
            pollInterval = setInterval(checkStatus, 1000);
        } catch (error) {
            showError("Błąd inicjalizacji.");
        }
    }

    async function checkStatus() {
        const response = await fetch(`/check_status/${currentTaskId}`);
        const data = await response.json();

        if (data.status === 'completed') {
            stopPolling();
            const sec = ((Date.now() - startTime) / 1000).toFixed(1);
            showResult(`QL TOTAL (${sec}s)`, data.result);
        } else if (data.status === 'error') {
            stopPolling();
            showError(data.result);
        }
    }

    function stopPolling() {
        clearInterval(pollInterval);
        document.getElementById('startBtn').disabled = false;
        document.getElementById('loadingElement').style.display = 'none';
    }

    function showResult(label, value) {
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('resultLabel').innerText = label;
        document.getElementById('resultValue').className = 'result-value';
        document.getElementById('resultValue').innerText = value;
    }

    function showError(msg) {
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('resultLabel').innerText = "Błąd:";
        document.getElementById('resultValue').className = 'error-value';
        document.getElementById('resultValue').innerText = msg;
    }

    document.getElementById('tourId').addEventListener('keypress', e => { if (e.key === 'Enter') initiateScrape(); });
</script>

</body>
</html>
